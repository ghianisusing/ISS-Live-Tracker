<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Live Tracker</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


    <!-- Custom CSS -->
    <link rel="stylesheet" href="iss.css">
</head>

<body>

    <header>
        <h1>🛰 ISS Live Tracker</h1>
    </header>

    <main>

        <!-- Map Section -->
        <section id="map"></section>

        <!-- Information Panel -->
        <aside id="info">

            <h2>ISS Information</h2>

            <div class="info-group">

                <h3>Current Position</h3>

                <div class="info-item">
                    <span>Latitude</span>
                    <strong id="latitude">--</strong>
                </div>

                <div class="info-item">
                    <span>Longitude</span>
                    <strong id="longitude">--</strong>
                </div>

            </div>

            <div class="info-group">

                <h3>System</h3>

                <div class="info-item">
                    <span>Last Updated</span>
                    <strong id="last-update">--</strong>
                </div>

                <div class="info-item">
                    <span>Status</span>
                    <span class="status live" id="status">
                        ● LIVE
                    </span>
                </div>

            </div>

        </aside>

    </main>

    <footer>
        <p>
            Live ISS Tracking using Leaflet.js & OpenStreetMap
        </p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Your JavaScript -->
    <script src="iss.js"></script>

</body>

</html>
