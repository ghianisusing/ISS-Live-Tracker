<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ISS Live Tracker</title>

    <!-- CSS -->
    <link rel="stylesheet" href="iss.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

    <header>
        <h1>🛰 ISS Live Tracker</h1>
        <p>Track the International Space Station in real time.</p>
    </header>

    <main>


        <section id="map"></section>


        <aside id="info">

            <h2>ISS Telemetry</h2>

            <div class="stats-grid">

                <div class="stat-card">
                    <span>Latitude</span>
                    <h3 id="latitude">--</h3>
                </div>

                <div class="stat-card">
                    <span>Longitude</span>
                    <h3 id="longitude">--</h3>
                </div>

                <div class="stat-card">
                    <span>Altitude</span>
                    <h3 id="altitude">--</h3>
                </div>

                <div class="stat-card">
                    <span>Velocity</span>
                    <h3 id="velocity">--</h3>
                </div>

                <div class="stat-card">
                    <span>Visibility</span>
                    <h3 id="visibility">--</h3>
                </div>

                <div class="stat-card">
                    <span>Status</span>
                    <h3 id="status" class="live">● LIVE</h3>
                </div>

            </div>

            <div class="system">

                <p>Last Updated</p>

                <strong id="last-update">
                    --
                </strong>

            </div>

            <div class="controls">

                <button id="follow-btn">
                    🛰 Follow ISS
                </button>

                <button id="locate-btn">
                    📍 Locate ISS
                </button>

                <button id="reset-btn">
                    🌍 Reset View
                </button>

            </div>

        </aside>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet.marker.slideto@0.2.0/Leaflet.Marker.SlideTo.js"></script>

    <script src="iss.js"></script>

</body>

</html>
